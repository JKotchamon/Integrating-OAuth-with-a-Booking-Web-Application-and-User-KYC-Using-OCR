services:
  web:
    build: .
    container_name: hbms_web
    ports:
      - "8080:80"
    volumes:
      - ./html:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html

  db:
    image: mysql:8.0
    container_name: hbms_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: StrongDBPassword@
      MYSQL_DATABASE: hbmsdb
    volumes:
      - ./hbmsdb.sql:/docker-entrypoint-initdb.d/hbmsdb.sql
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pStrongDBPassword@"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: hbms_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: StrongDBPassword@
    depends_on:
      - db

volumes:
  db_data:
